<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Einstein</title>
    <link href="../dist/www/assets/fonts/open-sans/400.css" rel="stylesheet">
    <link rel="stylesheet" href="../dist/www/app.css">
</head>

<body>
    <div class="fullscreen-container">
        <div id="board-container"></div>
        <div class="side-panel">
            <div id="buttons-container">
                <button id="btn-new-game">New Game</button>
                <button id="btn-pause">Pause</button>
                <div id="timer-container" class="timer-display">00:00:00</div>
                <button id="btn-reveal-hint">Reveal Hint</button>
                <button id="btn-reveal-card">Reveal Card</button>
                <button id="btn-toggle-hints">Toggle Hints</button>
                <button id="btn-options">Options</button>
                <button id="btn-help">Help</button>
            </div>
            <div id="hints-v-container"></div>
            <div id="hints-h-container"></div>
        </div>
    </div>

    <div id="screen-overlay"></div>

    <script type="module" src="../dist/www/app.js"></script>
</body>

</html>
